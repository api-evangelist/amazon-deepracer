id: https://api-evangelist.github.io/amazon-deepracer/capabilities/shared/deepracer.yaml
name: Amazon DeepRacer API
description: Naftiko shared capability definition for Amazon DeepRacer API, providing programmatic access to manage DeepRacer vehicles, reinforcement learning models, leaderboards, and racing tracks.
version: 1.0.0-alpha1
specificationVersion: 1.0.0-alpha1

provider:
  name: Amazon Web Services
  url: https://aws.amazon.com

tags:
  - AWS
  - Machine Learning
  - Reinforcement Learning
  - Autonomous Racing
  - Robotics

rest:
  port: 8100
  baseURL: https://deepracer.amazonaws.com
  auth:
    type: aws-signature-v4
    service: deepracer
  resources:
    - name: Cars
      description: Manage DeepRacer physical vehicles
      operations:
        - operationId: listCars
          summary: List Cars
          method: GET
          path: /20201101/cars
        - operationId: getCar
          summary: Get Car
          method: GET
          path: /20201101/cars/{arn}
        - operationId: updateCar
          summary: Update Car
          method: PATCH
          path: /20201101/cars/{arn}
    - name: Models
      description: Manage reinforcement learning models
      operations:
        - operationId: listModels
          summary: List Models
          method: GET
          path: /20201101/models
        - operationId: getModel
          summary: Get Model
          method: GET
          path: /20201101/models/{modelArn}
        - operationId: deleteModel
          summary: Delete Model
          method: DELETE
          path: /20201101/models/{modelArn}
    - name: Leaderboards
      description: Manage racing leaderboards and submissions
      operations:
        - operationId: listLeaderboards
          summary: List Leaderboards
          method: GET
          path: /20201101/leaderboards
        - operationId: getLeaderboard
          summary: Get Leaderboard
          method: GET
          path: /20201101/leaderboards/{arn}
        - operationId: listLeaderboardSubmissions
          summary: List Leaderboard Submissions
          method: GET
          path: /20201101/leaderboards/{arn}/rankings
    - name: Tracks
      description: Browse available racing tracks
      operations:
        - operationId: listTracks
          summary: List Tracks
          method: GET
          path: /20201101/tracks

mcp:
  port: 9100
  tools:
    - name: list_cars
      description: List all DeepRacer vehicles in the account
      operationId: listCars
    - name: get_car
      description: Get details for a specific DeepRacer vehicle
      operationId: getCar
    - name: update_car
      description: Update the name or configuration of a DeepRacer vehicle
      operationId: updateCar
    - name: list_models
      description: List reinforcement learning models for DeepRacer
      operationId: listModels
    - name: get_model
      description: Get the details and training status of a specific model
      operationId: getModel
    - name: delete_model
      description: Delete a reinforcement learning model
      operationId: deleteModel
    - name: list_leaderboards
      description: List active and past DeepRacer leaderboards
      operationId: listLeaderboards
    - name: get_leaderboard
      description: Get details and rankings for a specific leaderboard
      operationId: getLeaderboard
    - name: list_leaderboard_submissions
      description: List participant submissions and rankings for a leaderboard
      operationId: listLeaderboardSubmissions
    - name: list_tracks
      description: List available DeepRacer racing tracks
      operationId: listTracks
