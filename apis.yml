aid: amazon-deepracer
name: Amazon DeepRacer
description: >-
  AWS DeepRacer is an autonomous 1/18th scale race car designed to test reinforcement learning (RL) models by racing on
  a physical track. It provides a fully autonomous driving platform that enables developers to get hands-on experience
  with machine learning through a fun and engaging racing experience.
